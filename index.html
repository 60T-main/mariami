<!DOCTYPE html>
<html lang="ka">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>მარიამის დაბადების დღე</title>
        <link rel="stylesheet" href="style.css">
        <script type="module" src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
    </head>
    <body>
        <!-- ═══ HEART BALLOON INTRO LAYER ═══ -->
        <div id="balloon-layer" aria-hidden="true">
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:4%;--b-size:120px;--b-delay:0s;--b-dur:3.1s;--b-tilt:-4deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:13%;--b-size:90px;--b-delay:0.4s;--b-dur:3.6s;--b-tilt:3deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:22%;--b-size:140px;--b-delay:0.1s;--b-dur:2.9s;--b-tilt:-2deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:33%;--b-size:100px;--b-delay:0.6s;--b-dur:3.4s;--b-tilt:5deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:42%;--b-size:125px;--b-delay:0.2s;--b-dur:3.9s;--b-tilt:-3deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:51%;--b-size:108px;--b-delay:0.5s;--b-dur:3.2s;--b-tilt:2deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:62%;--b-size:132px;--b-delay:0s;--b-dur:2.8s;--b-tilt:-5deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:72%;--b-size:95px;--b-delay:0.7s;--b-dur:3.5s;--b-tilt:4deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:80%;--b-size:115px;--b-delay:0.3s;--b-dur:3.7s;--b-tilt:-2deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:89%;--b-size:98px;--b-delay:0.1s;--b-dur:2.7s;--b-tilt:3deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:8%;--b-size:82px;--b-delay:1.0s;--b-dur:4.1s;--b-tilt:6deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:27%;--b-size:104px;--b-delay:0.8s;--b-dur:3.8s;--b-tilt:-6deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:45%;--b-size:148px;--b-delay:0.2s;--b-dur:3.3s;--b-tilt:2deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:58%;--b-size:126px;--b-delay:0.9s;--b-dur:3.0s;--b-tilt:-3deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
            <dotlottie-player
                class="heart-balloon"
                style="--b-x:77%;--b-size:90px;--b-delay:0.4s;--b-dur:4.2s;--b-tilt:4deg"
                src="Heart Baloon.lottie"
                autoplay
                loop
            ></dotlottie-player>
        </div>
        <!-- Desktop notice -->
        <div class="desktop-notice" id="desktopNotice">
            <img src="weddsite.png" alt="Weddsite" class="desktop-notice__logo">
            <p>გთხოვთ, გახსენით მობილური ტელეფონიდან</p>
        </div>
        <div class="site-wrap">
            <!-- flowers-br sits outside hero/program so it bleeds across both -->
            <!-- ═══ HERO ═══ -->
            <section class="hero" id="hero">
                <!-- Corner flowers -->
                <img
                    class="deco flowers-tl"
                    src="flowers-top-left.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="2"
                >
                <img
                    class="deco flowers-tr"
                    src="flowers-top-right.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="2"
                >
                <!-- Crown -->
                <img
                    class="deco crown"
                    src="crown.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="1"
                >
                <!-- Side characters -->
                <img
                    class="deco unicorn"
                    src="unicorn.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="3"
                >
                <img
                    class="deco castle"
                    src="castle.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="3"
                >
                <img
                    class="deco butterflies"
                    src="butterflys-right.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="4"
                >
                <!-- Side detail decorations -->
                <img
                    class="deco vine-left"
                    src="design-lower-left.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="4"
                >
                <img
                    class="deco deco-right"
                    src="design-lower-right.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="4"
                >
                <!-- Wand & Balloons -->
                <img
                    class="deco wand"
                    src="wand.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="5"
                >
                <img
                    class="deco balloons"
                    src="baloons-right.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="5"
                >
                <!-- Main content -->
                <div class="hero-content">
                    <!-- Photo + age float together -->
                    <div class="hero-float" data-reveal="7">
                        <img class="mariami-photo" src="mariami.png" alt="მარიამი">
                    </div>
                    <img
                        class="candle"
                        src="candle.png"
                        alt=""
                        data-reveal="8"
                    >
                    <h1 class="hero-name" data-reveal="9">მარიამი</h1>
                    <p class="hero-invite" data-reveal="10">გეპატიჟებათ დაბადების დღეზე</p>
                    <div class="kids-dream" data-reveal="11">
                        <img src="kids-dream.png" alt="">
                    </div>
                    <p class="hero-date" data-reveal="12">30 აპრილი</p>
                    <p class="hero-time" data-reveal="12">19:00</p>
                    <a style="color: #c4607e;" href="https://maps.app.goo.gl/vcGGdMzY9cLK6ceH6" target="_blank">
                        <p class="hero-address" data-reveal="12">📍ორთაჭალა, გორგასლის 4ა</p>
                    </a>
                </div>
                <!-- Sparkle container -->
                <div
                    class="sparkles"
                    id="sparkles"
                    aria-hidden="true"
                    data-reveal="12"
                ></div>
            </section>
            <!-- ═══ PROGRAM ═══ -->
            <section class="program" id="program">
                <img
                    class="flowers-br-bleed"
                    src="flowers-bottom.png"
                    alt=""
                    aria-hidden="true"
                    data-reveal="6"
                >
                <!-- Reused decorations — different positions -->
                <img
                    class="prog-deco prog-butterflies"
                    src="butterflys-right.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-wand"
                    src="wand.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-balloons"
                    src="baloons-left.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-vine-l"
                    src="design-lower-left.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-vine-r"
                    src="design-lower-right.png"
                    alt=""
                    aria-hidden="true"
                >
                <!-- Carriage bottom-center -->
                <img
                    class="prog-deco prog-carriage"
                    src="carriage.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-flower-bl"
                    src="flowers-bottom-left.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-flower-br"
                    src="flowers-bottom-right.png"
                    alt=""
                    aria-hidden="true"
                >
                <img
                    class="prog-deco prog-carriage"
                    src="carriage.png"
                    alt=""
                    aria-hidden="true"
                >
                <div class="program-inner">
                    <h2 class="program-title">✦ პროგრამა ✦</h2>
                    <div class="program-list">
                        <!-- 1 -->
                        <div
                            class="prog-item"
                            data-modal="bubbles"
                            role="button"
                            tabindex="0"
                        >
                            <img class="prog-img" src="bubles.png" alt="ბუშტების გუმბათი">
                            <span class="prog-label">ბუშტების გუმბათი</span>
                        </div>
                        <!-- 2 — reversed -->
                        <div
                            class="prog-item prog-item--rev"
                            data-modal="laser"
                            role="button"
                            tabindex="0"
                        >
                            <img class="prog-img prog-img--fairies" src="fairies.png" alt="ლაზერ ფერია შოუ">
                            <span class="prog-label">ლაზერ ფერია შოუ</span>
                        </div>
                        <!-- 3 -->
                        <div
                            class="prog-item"
                            data-modal="face"
                            role="button"
                            tabindex="0"
                        >
                            <img class="prog-img prog-img--paint" src="paint.png" alt="სახეზე ხატვა">
                            <span class="prog-label">სახეზე ხატვა</span>
                        </div>
                        <!-- 4 — reversed -->
                        <div
                            class="prog-item prog-item--rev"
                            data-modal="balloons"
                            role="button"
                            tabindex="0"
                        >
                            <img class="prog-img prog-img--fairies" src="baloons-left.png" alt="ბუშტების შოუ">
                            <span class="prog-label">ბუშტების შოუ</span>
                        </div>
                    </div>
                </div>
            </section>
            <!-- ═══ FOOTER ═══ -->
            <footer class="site-footer">
                <a
                    class="footer-credit"
                    href="https://www.instagram.com/weddsites/"
                    target="_blank"
                    rel="noopener"
                >
                    <img src="logo-weddsite.png" alt="Weddsite" class="footer-logo">
                    <span>Made with ♥ by Weddsite</span>
                </a>
            </footer>
        </div>
        <!-- ═══ PROGRAM MODALS ═══ -->
        <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
            <div
                class="modal-box"
                id="modalBox"
                role="dialog"
                aria-modal="true"
            >
                <button class="modal-close" id="modalClose" aria-label="დახურვა">✕</button>
                <img
                    class="modal-img"
                    id="modalImg"
                    src=""
                    alt=""
                >
                <h3 class="modal-title" id="modalTitle"></h3>
                <p class="modal-body" id="modalBody"></p>
                <span style></span>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
